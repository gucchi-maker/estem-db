<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESTEM 施策データベース</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      --radius: 8px;
      --border: #E5E7EB;
      --border-strong: #D1D5DB;
      --border-accent: #6366F1;
      --border-danger: #FCA5A5;
      --surface-0: #F9FAFB;
      --surface-1: #F3F4F6;
      --surface-2: #FFFFFF;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;
      --text-accent: #4F46E5;
      --text-success: #059669;
      --text-warning: #D97706;
      --text-danger: #DC2626;
      --fill-accent: #6366F1;
      --fill-accent-hover: #4F46E5;
      --on-accent: #FFFFFF;
      --bg-accent: #EEF2FF;
      --bg-success: #D1FAE5;
      --bg-warning: #FEF3C7;
      --bg-danger: #FEE2E2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); font-size: 14px; color: var(--text-primary); background: var(--surface-0); }
    .app { display: flex; height: 100vh; min-height: 600px; }
    .sidebar { width: 220px; flex-shrink: 0; background: var(--surface-1); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; padding: 16px 0; }
    .sidebar-logo { padding: 0 16px 14px; border-bottom: 0.5px solid var(--border); margin-bottom: 8px; }
    .sidebar-logo h1 { font-size: 15px; font-weight: 500; }
    .sidebar-logo p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .nav-section { padding: 10px 16px 4px; font-size: 10px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 6px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; }
    .nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
    .nav-item.active { background: var(--bg-accent); color: var(--text-accent); font-weight: 500; }
    .nav-item i { font-size: 16px; }
    .sync-status { margin: 8px 16px 0; padding: 7px 10px; border-radius: var(--radius); font-size: 11px; display: flex; align-items: center; gap: 6px; }
    .sync-ok { background: var(--bg-success); color: var(--text-success); }
    .sync-off { background: var(--surface-0); color: var(--text-muted); border: 0.5px solid var(--border); }
    .sync-loading { background: var(--bg-warning); color: var(--text-warning); }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok { background: var(--text-success); }
    .dot-off { background: var(--text-muted); }
    .dot-loading { background: var(--text-warning); }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { padding: 10px 14px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--surface-2); flex-wrap: wrap; }
    .topbar input[type=text] { flex: 1; min-width: 120px; padding: 7px 10px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--surface-2); color: var(--text-primary); }
    .topbar input[type=text]:focus { outline: none; border-color: var(--border-accent); }
    .topbar select { padding: 7px 8px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--surface-2); color: var(--text-primary); cursor: pointer; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); font-size: 13px; cursor: pointer; background: transparent; color: var(--text-primary); white-space: nowrap; }
    .btn:hover { background: var(--surface-1); }
    .btn-primary { background: var(--fill-accent); color: var(--on-accent); border-color: var(--fill-accent); }
    .btn-primary:hover { background: var(--fill-accent-hover); }
    .btn-sm { padding: 5px 9px; font-size: 12px; }
    .content { flex: 1; overflow-y: auto; padding: 14px; }
    .list-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 70px 36px; gap: 10px; padding: 6px 10px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; border-bottom: 0.5px solid var(--border); margin-bottom: 4px; }
    .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 5px; overflow: hidden; cursor: pointer; }
    .card:hover { border-color: var(--border-strong); }
    .card.expanded { border-color: var(--border-accent); }
    .card-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 70px 36px; gap: 10px; padding: 10px; align-items: center; }
    .card-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .card-name i { font-size: 12px; color: var(--text-muted); transition: transform .15s; }
    .expanded .card-name i { transform: rotate(90deg); }
    .card-col { font-size: 12px; color: var(--text-secondary); }
    .badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 500; }
    .badge-teal { background: var(--bg-success); color: var(--text-success); }
    .badge-gray { background: var(--surface-1); color: var(--text-secondary); border: 0.5px solid var(--border); }
    .badge-accent { background: var(--bg-accent); color: var(--text-accent); }
    .badge-red { background: var(--bg-danger); color: var(--text-danger); }
    .badge-amber { background: var(--bg-warning); color: var(--text-warning); }
    .logs-wrap { border-top: 0.5px solid var(--border); background: var(--surface-1); padding: 10px 14px; }
    .log-item { border-left: 2px solid var(--border-accent); padding: 7px 10px; margin-bottom: 7px; background: var(--surface-2); border-radius: 0 var(--radius) var(--radius) 0; }
    .log-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; flex-wrap: wrap; }
    .log-author { font-size: 12px; font-weight: 500; }
    .log-date { font-size: 11px; color: var(--text-muted); }
    .log-body { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
    .log-card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; padding: 12px 14px; }
    .log-card-施策名 { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty i { font-size: 32px; display: block; margin-bottom: 8px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--surface-2); border-radius: 12px; border: 0.5px solid var(--border); width: 520px; max-width: 92vw; max-height: 85vh; overflow-y: auto; }
    .modal-header { padding: 14px 18px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 15px; font-weight: 500; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; padding: 0; }
    .modal-close:hover { color: var(--text-primary); }
    .modal-body { padding: 18px; }
    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
    .form-input { width: 100%; padding: 7px 10px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--surface-2); color: var(--text-primary); }
    .form-input:focus { outline: none; border-color: var(--border-accent); }
    textarea.form-input { min-height: 75px; resize: vertical; font-family: var(--font-sans); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-footer { padding: 10px 18px; border-top: 0.5px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--fill-accent); color: var(--on-accent); padding: 10px 16px; border-radius: var(--radius); font-size: 13px; z-index: 200; display: flex; align-items: center; gap: 8px; opacity: 0; transition: opacity .2s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .info-box { background: var(--bg-accent); border: 0.5px solid var(--border-accent); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: var(--text-accent); margin-bottom: 14px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.6; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    .stat-card { background: var(--surface-1); border-radius: var(--radius); padding: 12px 14px; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; }
    .export-section { background: var(--surface-1); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
    .export-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .export-card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
    .export-card i { font-size: 22px; color: var(--text-accent); display: block; margin-bottom: 6px; }
    .export-card-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
    .export-card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <h1>ESTEM DB</h1>
      <p>施策ナレッジ管理</p>
    </div>
    <div id="syncStatus" class="sync-status sync-off"><div class="sync-dot dot-off"></div><span>ローカル保存</span></div>
    <div class="nav-section">メニュー</div>
    <div class="nav-item active" onclick="showView('list')"><i class="ti ti-layout-list"></i>施策一覧</div>
    <div class="nav-item" onclick="showView('logs')"><i class="ti ti-message-circle"></i>振り返りログ</div>
    <div class="nav-item" onclick="showView('stats')"><i class="ti ti-chart-bar"></i>サマリー</div>
    <div class="nav-section">データ</div>
    <div class="nav-item" onclick="showView('export')"><i class="ti ti-download"></i>エクスポート</div>
    <div class="nav-item" onclick="showView('settings')"><i class="ti ti-settings"></i>設定</div>
    <div style="flex:1"></div>
    <div style="padding:10px 16px;border-top:0.5px solid var(--border)">
      <div style="font-size:11px;color:var(--text-muted)" id="userLabel">ユーザー未設定</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:2px" id="lastSyncLabel"></div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <input type="text" id="searchInput" placeholder="施策名・内容で検索..." oninput="render()">
      <select id="filterStatus" onchange="render()">
        <option value="">すべてのステータス</option>
        <option value="実施中">実施中</option>
        <option value="検討中">検討中</option>
        <option value="完了">完了</option>
        <option value="中止">中止</option>
      </select>
      <select id="filterCat" onchange="render()">
        <option value="">すべての分類</option>
        <option value="交流促進">交流促進</option>
        <option value="習慣化">習慣化</option>
        <option value="環境整備">環境整備</option>
        <option value="授業連動">授業連動</option>
        <option value="その他">その他</option>
      </select>
      <button class="btn btn-primary" id="addBtn" onclick="handleAddBtn()"><i class="ti ti-plus"></i><span id="addBtnLabel">施策を追加</span></button>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toastMsg"></span></div>

<script>
const CATS = ['交流促進','習慣化','環境整備','授業連動','その他']
const STATUSES = ['検討中','実施中','完了','中止']
const LOG_TYPES = ['良かった点','課題点','子どもの反応','今後の対応']
const STATUS_BADGE = {実施中:'badge-teal',検討中:'badge-accent',完了:'badge-gray',中止:'badge-red'}

let data = {施策:[], logs:[]}
let expanded = {}
let currentView = 'list'
let userName = ''

function localSave() {
  try { localStorage.setItem('estem_gh', JSON.stringify({data, userName})) } catch(e) {}
}
function localLoad() {
  try {
    const d = localStorage.getItem('estem_gh')
    if (d) { const p = JSON.parse(d); data = p.data || {施策:[], logs:[]}; userName = p.userName || '' }
  } catch(e) {}
  if (!data.施策 || !data.logs) data = {施策:[], logs:[]}
  if (data.施策.length === 0) seed()
}

function seed() {
  const now = Date.now()
  data.施策 = [
    {id:'s1', name:'今日の一言ボード', cat:'習慣化', status:'実施中', start:'2025-06-01', end:'', target:'自習室全員', author:'山田', summary:'来室時に今日やることを一言書く習慣をつくる', goal:'小さな目標を持って自習室を使う習慣の定着', created:now},
    {id:'s2', name:'助けてクエスト', cat:'交流促進', status:'実施中', start:'2025-06-10', end:'', target:'自習室全員', author:'佐藤', summary:'スタッフが困っていることを子どもへの依頼として提示し一緒に解決する', goal:'子ども同士の自然な交流と協力体験を生む', created:now},
    {id:'s3', name:'空調クエスト（山形校）', cat:'交流促進', status:'完了', start:'2025-05-15', end:'2025-05-30', target:'山形校自習室', author:'田中', summary:'空調の網に落ちた鉛筆を取り出す方法を考えてもらう', goal:'共通の問題を解決する体験による仲間意識の醸成', created:now},
  ]
  data.logs = [
    {id:'l1', 施策id:'s1', type:'良かった点', author:'山田', date:'2025-06-10', body:'来た子が自然とボードに向かうようになった。'},
    {id:'l2', 施策id:'s1', type:'課題点', author:'佐藤', date:'2025-06-12', body:'書かない子が半数以上いる。ボードの位置が見えにくいかもしれない。'},
    {id:'l3', 施策id:'s2', type:'子どもの反応', author:'田中', date:'2025-06-11', body:'解決策を思いついた瞬間に他の子に声をかけていた。'},
    {id:'l4', 施策id:'s3', type:'良かった点', author:'田中', date:'2025-05-28', body:'トリモチ棒のアイデアが出て無事取り出せた。達成感で子どもたちが盛り上がった。'},
  ]
}

function updateAddBtn() {
  const label = document.getElementById('addBtnLabel')
  label.textContent = currentView === 'logs' ? 'ログを追加' : '施策を追加'
  document.getElementById('addBtn').style.display = ['list','logs'].includes(currentView) ? 'inline-flex' : 'none'
}

function handleAddBtn() {
  if (currentView === 'logs') openLogModal()
  else openModal('施策')
}

function showView(v) {
  currentView = v
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    el.classList.toggle('active', ['list','logs','stats','export','settings'][i] === v)
  })
  updateAddBtn()
  render()
}

function render() {
  if (currentView === 'list') renderList()
  else if (currentView === 'logs') renderLogs()
  else if (currentView === 'stats') renderStats()
  else if (currentView === 'export') renderExport()
  else renderSettings()
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function today() { return new Date().toISOString().slice(0,10) }
function uid() { return '_' + Math.random().toString(36).slice(2) }

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase()
  const st = document.getElementById('filterStatus').value
  const ct = document.getElementById('filterCat').value
  const list = data.施策.filter(s => {
    if (q && !s.name.toLowerCase().includes(q) && !s.summary.toLowerCase().includes(q)) return false
    if (st && s.status !== st) return false
    if (ct && s.cat !== ct) return false
    return true
  })
  let html = `<div class="list-header"><div>施策名</div><div>分類</div><div>ステータス</div><div>実施期間</div><div style="text-align:center">ログ</div><div></div></div>`
  if (!list.length) html += '<div class="empty"><i class="ti ti-inbox"></i><p>施策が見つかりません</p></div>'
  list.forEach(s => {
    const logs = data.logs.filter(l => l.施策id === s.id)
    const isExp = expanded[s.id]
    html += `<div class="card${isExp?' expanded':''}" onclick="toggle('${s.id}')">
      <div class="card-row">
        <div class="card-name"><i class="ti ti-chevron-right"></i>${esc(s.name)}</div>
        <div class="card-col"><span class="badge badge-gray">${esc(s.cat)}</span></div>
        <div class="card-col"><span class="badge ${STATUS_BADGE[s.status]||'badge-gray'}">${esc(s.status)}</span></div>
        <div class="card-col" style="font-size:11px">${esc(s.start)}${s.end?' → '+esc(s.end):' →'}</div>
        <div class="card-col" style="text-align:center">${logs.length}件</div>
        <div class="card-col" style="text-align:center"><button onclick="event.stopPropagation();confirmDelete施策('${s.id}')" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:15px;padding:2px;border-radius:4px;display:flex;align-items:center;justify-content:center" title="削除"><i class="ti ti-trash"></i></button></div>
      </div>`
    if (isExp) {
      html += `<div style="padding:0 10px 10px;border-top:0.5px solid var(--border);padding-top:10px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px">
          <div><div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">概要</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.6">${esc(s.summary)}</div></div>
          <div><div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">目的</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.6">${esc(s.goal)}</div></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:11px;color:var(--text-muted)">起案者：${esc(s.author)}</span>
          <button class="btn btn-sm" onclick="event.stopPropagation();editModal('${s.id}')"><i class="ti ti-edit"></i>編集</button>
        </div>
      </div>
      <div class="logs-wrap">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:12px;font-weight:500;color:var(--text-secondary)">振り返りログ（${logs.length}件）</div>
          <button class="btn btn-sm" onclick="event.stopPropagation();openModal('log','${s.id}')"><i class="ti ti-plus"></i>追加</button>
        </div>`
      if (!logs.length) html += '<div style="font-size:12px;color:var(--text-muted)">まだログがありません</div>'
      logs.forEach(l => {
        const tc = {良かった点:'text-success',課題点:'text-danger',子どもの反応:'text-accent',今後の対応:'text-warning'}
        html += `<div class="log-item">
          <div class="log-meta">
            <span class="log-author">${esc(l.author)}</span>
            <span class="log-date">${esc(l.date)}</span>
            <span style="font-size:11px;color:var(--${tc[l.type]||'text-secondary'})">${esc(l.type)}</span>
            <button onclick="event.stopPropagation();deleteLog('${l.id}')" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:0"><i class="ti ti-trash"></i></button>
          </div>
          <div class="log-body">${esc(l.body)}</div>
        </div>`
      })
      html += `</div></div>`
    }
    html += '</div>'
  })
  document.getElementById('mainContent').innerHTML = html
}

function renderLogs() {
  const q = document.getElementById('searchInput').value.toLowerCase()
  const st = document.getElementById('filterStatus').value
  const ct = document.getElementById('filterCat').value
  const tc = {良かった点:'badge-teal',課題点:'badge-red',子どもの反応:'badge-accent',今後の対応:'badge-amber'}
  const tcc = {良かった点:'text-success',課題点:'text-danger',子どもの反応:'text-accent',今後の対応:'text-warning'}
  let logs = data.logs.filter(l => {
    const s = data.施策.find(x => x.id === l.施策id)
    if (q && !l.body.toLowerCase().includes(q) && !l.author.toLowerCase().includes(q) && !(s && s.name.toLowerCase().includes(q))) return false
    if (st || ct) { if (!s) return false; if (st && s.status !== st) return false; if (ct && s.cat !== ct) return false }
    return true
  })
  let html = `<div style="margin-bottom:12px;font-size:13px;color:var(--text-secondary)">振り返りログ（${logs.length}件）</div>`
  if (!data.施策.length) { html += '<div class="empty"><i class="ti ti-alert-circle"></i><p>先に施策を登録してください</p></div>'; document.getElementById('mainContent').innerHTML = html; return }
  if (!logs.length) html += '<div class="empty"><i class="ti ti-message-off"></i><p>ログが見つかりません</p></div>'
  logs.slice().reverse().forEach(l => {
    const s = data.施策.find(x => x.id === l.施策id)
    html += `<div class="log-card">
      <div class="log-card-施策名"><i class="ti ti-folder" style="font-size:11px;margin-right:3px"></i>${s ? esc(s.name) : '不明な施策'}</div>
      <div class="log-meta">
        <span class="log-author">${esc(l.author)}</span>
        <span class="log-date">${esc(l.date)}</span>
        <span class="badge ${tc[l.type]||'badge-gray'}">${esc(l.type)}</span>
        <button onclick="deleteLog('${l.id}')" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:0"><i class="ti ti-trash"></i></button>
      </div>
      <div class="log-body">${esc(l.body)}</div>
    </div>`
  })
  document.getElementById('mainContent').innerHTML = html
}

        const c2 = {良かった点:'var(--text-success)',課題点:'var(--text-danger)',子どもの反応:'var(--text-accent)',今後の対応:'var(--text-warning)'}
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <div style="font-size:12px;color:var(--text-secondary);width:72px">${t}</div>

}

function saveSettings() {
  const name = document.getElementById('inp_user').value.trim()
  if (!name) { showToast('名前を入力してください'); return }
  userName = name
  localSave()
  document.getElementById('userLabel').textContent = 'ユーザー：' + userName
  showToast('設定を保存しました')
}

function csvEscape(v) { if (v === null || v === undefined) return ''; const s = String(v); if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"'; return s }
function downloadFile(content, filename, type) {
  const blob = new Blob(['\uFEFF' + content], {type: type + ';charset=utf-8'})
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); URL.revokeObjectURL(a.href)
  showToast(filename + 'をダウンロードしました')
}
function exportCSV(type) {
  const date = today()
  if (type === '施策') {
    const h = ['施策名','分類','ステータス','開始日','終了日','対象','起案者','概要','目的','ログ件数']
    const rows = data.施策.map(s => [s.name,s.cat,s.status,s.start,s.end,s.target,s.author,s.summary,s.goal,data.logs.filter(l=>l.施策id===s.id).length].map(csvEscape).join(','))
    downloadFile([h.map(csvEscape).join(','),...rows].join('\n'), `ESTEM_施策一覧_${date}.csv`, 'text/csv')
  } else {
    const h = ['施策名','記入者','記入日','種別','内容']
    const rows = data.logs.map(l => { const s = data.施策.find(x => x.id === l.施策id); return [s?s.name:'',l.author,l.date,l.type,l.body].map(csvEscape).join(',') })
    downloadFile([h.map(csvEscape).join(','),...rows].join('\n'), `ESTEM_振り返りログ_${date}.csv`, 'text/csv')
  }
}
function exportText() {
  let txt = `ESTEM 施策データベース エクスポート\n出力日：${today()}\n${'='.repeat(50)}\n\n`
  data.施策.forEach((s,i) => {
    txt += `【施策 ${i+1}】${s.name}\n分類：${s.cat}　ステータス：${s.status}\n対象：${s.target}　起案者：${s.author}\n概要：${s.summary}\n目的：${s.goal}\n`
    const logs = data.logs.filter(l => l.施策id === s.id)
    if (logs.length) { txt += `\n  振り返りログ（${logs.length}件）\n`; logs.forEach(l => { txt += `  ─ [${l.type}] ${l.author} / ${l.date}\n    ${l.body}\n` }) }
    txt += '\n' + '-'.repeat(50) + '\n\n'
  })
  downloadFile(txt, `ESTEM_全データ_${today()}.txt`, 'text/plain')
}
function exportJSON() { downloadFile(JSON.stringify(data, null, 2), `ESTEM_バックアップ_${today()}.json`, 'application/json') }
function importJSON(input) {
  const file = input.files[0]; if (!file) return
  const reader = new FileReader()
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result)
      if (!parsed.施策 || !parsed.logs) { alert('形式が正しくありません'); return }
      if (!confirm(`施策${parsed.施策.length}件、ログ${parsed.logs.length}件を復元します。現在のデータは上書きされます。`)) return
      data = parsed; localSave(); showView('list'); showToast('データを復元しました')
    } catch(err) { alert('ファイルの読み込みに失敗しました') }
  }
  reader.readAsText(file); input.value = ''
}

function toggle(id) { expanded[id] = !expanded[id]; render() }

function closeModal() { document.getElementById('modalBg').style.display = 'none' }

function save施策() {
  const name = document.getElementById('f_name').value.trim()
  if (!name) { alert('施策名を入力してください'); return }
  data.施策.push({id:uid(), name, cat:document.getElementById('f_cat').value, status:document.getElementById('f_status').value, start:document.getElementById('f_start').value, end:document.getElementById('f_end').value, target:document.getElementById('f_target').value, author:document.getElementById('f_author').value, summary:document.getElementById('f_summary').value, goal:document.getElementById('f_goal').value, created:Date.now()})
  localSave(); closeModal(); render()
}

function update施策(id) {
  const name = document.getElementById('f_name').value.trim()
  if (!name) { alert('施策名を入力してください'); return }
  const s = data.施策.find(x => x.id === id); if (!s) return
  Object.assign(s, {name, cat:document.getElementById('f_cat').value, status:document.getElementById('f_status').value, start:document.getElementById('f_start').value, end:document.getElementById('f_end').value, target:document.getElementById('f_target').value, author:document.getElementById('f_author').value, summary:document.getElementById('f_summary').value, goal:document.getElementById('f_goal').value})
  localSave(); closeModal(); render()
}

function confirmDelete施策(id) {
  const s = data.施策.find(x => x.id === id)
  if (!s) return
  const logCount = data.logs.filter(l => l.施策id === id).length
  const msg = logCount > 0
    ? `「${s.name}」を削除しますか？\n\nこの施策に紐づく振り返りログ ${logCount} 件も一緒に削除されます。\nこの操作は元に戻せません。`
    : `「${s.name}」を削除しますか？\n\nこの操作は元に戻せません。`
  if (!confirm(msg)) return
  delete施策(id)
}

function delete施策(id) {
  if (!confirm('この施策と紐づくログを削除しますか？')) return
  data.施策 = data.施策.filter(x => x.id !== id)
  data.logs = data.logs.filter(l => l.施策id !== id)
  delete expanded[id]; localSave(); closeModal(); render()
}

function saveLog(施策id) {
  const author = document.getElementById('f_author').value.trim()
  const body = document.getElementById('f_body').value.trim()
  if (!author || !body) { alert('記入者と内容を入力してください'); return }
  data.logs.push({id:uid(), 施策id, type:document.getElementById('f_type').value, author, date:document.getElementById('f_date').value, body})
  localSave(); closeModal(); expanded[施策id] = true; render()
}

function deleteLog(id) {
  if (!confirm('このログを削除しますか？')) return
  data.logs = data.logs.filter(l => l.id !== id); localSave(); render()
}

function showToast(msg) {
  const t = document.getElementById('toast'); document.getElementById('toastMsg').textContent = msg
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500)
}

localLoad()
document.getElementById('userLabel').textContent = userName ? 'ユーザー：' + userName : 'ユーザー未設定'
updateAddBtn()
render()
